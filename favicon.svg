<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#010A13"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0E6BE"/>
      <stop offset="100%" stop-color="#C89B3C"/>
    </linearGradient>
  </defs>
  <!-- 背景の丸 -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- 外枠リング -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#C89B3C" stroke-width="8" opacity="0.4"/>
  <!-- 王冠 -->
  <g transform="translate(256,240) scale(2.8)">
    <polygon points="0,-52 19,0 42,-18 33,28 -33,28 -42,-18 -19,0" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round"/>
    <rect x="-33" y="28" width="66" height="10" rx="2.5" fill="#C89B3C" opacity="0.5"/>
    <circle cx="0" cy="-52" r="5" fill="#F0E6BE"/>
    <circle cx="42" cy="-18" r="4" fill="#C89B3C"/>
    <circle cx="-42" cy="-18" r="4" fill="#C89B3C"/>
  </g>
  <!-- テキスト S -->
  <text x="256" y="420" text-anchor="middle" font-family="serif" font-weight="bold" font-size="72" fill="#C89B3C" opacity="0.7">S</text>
</svg>
